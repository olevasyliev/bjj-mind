<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=390, initial-scale=1.0" />
  <title>BJJ Mind — Tournament Win</title>
  <script src="https://mcp.figma.com/mcp/html-to-design/capture.js" async></script>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { width: 390px; height: 844px; background: #0a0a14; font-family: 'Nunito', sans-serif; overflow: hidden; display: flex; flex-direction: column; align-items: center; }

    /* Trophy burst */
    .trophy-area {
      padding-top: 52px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0;
      flex-shrink: 0;
    }

    .trophy-glow {
      width: 120px; height: 120px;
      background: radial-gradient(circle, rgba(245,158,11,0.25) 0%, transparent 70%);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 72px;
      animation: trophyFloat 3s ease-in-out infinite;
    }
    @keyframes trophyFloat {
      0%,100% { transform: translateY(0); filter: drop-shadow(0 0 16px rgba(245,158,11,0.6)); }
      50%      { transform: translateY(-8px); filter: drop-shadow(0 0 28px rgba(245,158,11,0.9)); }
    }

    .result-label {
      font-size: 11px; font-weight: 900;
      color: #f59e0b; text-transform: uppercase;
      letter-spacing: 3px; margin-top: 8px;
    }

    .result-title {
      font-size: 48px; font-weight: 900;
      background: linear-gradient(135deg, #fcd34d, #f59e0b);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      letter-spacing: -1px; line-height: 1; margin-top: 4px;
    }

    .result-sub {
      font-size: 14px; font-weight: 700;
      color: rgba(255,255,255,0.4); margin-top: 6px;
    }

    /* Bracket strip */
    .bracket-strip {
      display: flex; align-items: center; justify-content: center;
      gap: 6px; padding: 18px 24px 0; width: 100%; flex-shrink: 0;
    }
    .bracket-node { display: flex; flex-direction: column; align-items: center; gap: 4px; }
    .b-match {
      width: 44px; height: 36px; border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 13px; font-weight: 900;
    }
    .b-match.win    { background: #1a3a1a; border: 2px solid #22c55e; color: #22c55e; }
    .b-match.champ  { background: linear-gradient(135deg, #854d0e, #713f12); border: 2px solid #f59e0b; color: #fcd34d; animation: champPulse 1.5s ease-in-out infinite; }
    @keyframes champPulse {
      0%,100% { box-shadow: 0 0 0 0 rgba(245,158,11,0.6); }
      50%      { box-shadow: 0 0 0 6px rgba(245,158,11,0); }
    }
    .b-label { font-size: 9px; font-weight: 800; color: rgba(255,255,255,0.3); text-transform: uppercase; letter-spacing: 0.5px; }
    .b-label.champ { color: #f59e0b; }
    .bracket-arrow { font-size: 14px; color: rgba(255,255,255,0.15); margin-bottom: 14px; }

    /* Stats grid */
    .stats-grid {
      display: grid; grid-template-columns: 1fr 1fr 1fr;
      gap: 10px; padding: 16px 20px 0; width: 100%; flex-shrink: 0;
    }
    .stat-card {
      background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.1);
      border-radius: 16px; padding: 14px 10px; text-align: center;
    }
    .stat-icon  { font-size: 22px; margin-bottom: 6px; }
    .stat-value { font-size: 20px; font-weight: 900; color: white; }
    .stat-label { font-size: 9px; font-weight: 800; color: rgba(255,255,255,0.3); text-transform: uppercase; letter-spacing: 0.5px; margin-top: 2px; }

    /* Rewards */
    .rewards-section { width: 100%; padding: 16px 20px 0; flex-shrink: 0; }
    .rewards-label { font-size: 10px; font-weight: 900; color: rgba(255,255,255,0.3); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 10px; }

    .reward-row {
      display: flex; gap: 10px;
    }
    .reward-chip {
      flex: 1; background: rgba(245,158,11,0.12); border: 1.5px solid rgba(245,158,11,0.3);
      border-radius: 14px; padding: 12px 14px;
      display: flex; align-items: center; gap: 10px;
    }
    .reward-icon  { font-size: 24px; flex-shrink: 0; }
    .reward-info  { flex: 1; }
    .reward-name  { font-size: 12px; font-weight: 900; color: #fcd34d; }
    .reward-value { font-size: 14px; font-weight: 900; color: white; margin-top: 2px; }

    /* CTA area */
    .cta-area { width: 100%; padding: 16px 20px 0; flex-shrink: 0; display: flex; flex-direction: column; gap: 10px; }

    .btn-primary {
      width: 100%; height: 58px; border-radius: 100px;
      background: linear-gradient(135deg, #f59e0b, #d97706);
      border: none; color: white;
      font-family: 'Nunito', sans-serif; font-size: 18px; font-weight: 900;
      cursor: pointer; box-shadow: 0 5px 0 #92400e;
      letter-spacing: -0.2px;
    }
    .btn-secondary {
      width: 100%; height: 50px; border-radius: 100px;
      background: transparent; border: 1.5px solid rgba(255,255,255,0.15);
      color: rgba(255,255,255,0.5);
      font-family: 'Nunito', sans-serif; font-size: 15px; font-weight: 800;
      cursor: pointer;
    }

    /* Confetti dots */
    .confetti { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; overflow: hidden; }
    .c-dot { position: absolute; border-radius: 3px; animation: confettiFall linear infinite; opacity: 0; }
    @keyframes confettiFall {
      0%   { transform: translateY(-20px) rotate(0deg); opacity: 1; }
      100% { transform: translateY(900px) rotate(720deg); opacity: 0; }
    }
  </style>
</head>
<body>

  <!-- Confetti -->
  <div class="confetti" id="confetti"></div>

  <div class="trophy-area">
    <div class="trophy-glow">🏆</div>
    <div class="result-label">Tournament Run Complete</div>
    <div class="result-title">VICTORY</div>
    <div class="result-sub">5 matches · 0 losses</div>
  </div>

  <div class="bracket-strip">
    <div class="bracket-node"><div class="b-match win">W</div><div class="b-label">1</div></div>
    <div class="bracket-arrow">›</div>
    <div class="bracket-node"><div class="b-match win">W</div><div class="b-label">2</div></div>
    <div class="bracket-arrow">›</div>
    <div class="bracket-node"><div class="b-match win">W</div><div class="b-label">3</div></div>
    <div class="bracket-arrow">›</div>
    <div class="bracket-node"><div class="b-match win">W</div><div class="b-label">4</div></div>
    <div class="bracket-arrow">›</div>
    <div class="bracket-node"><div class="b-match champ">🏆</div><div class="b-label champ">Final</div></div>
  </div>

  <div class="stats-grid">
    <div class="stat-card">
      <div class="stat-icon">🎯</div>
      <div class="stat-value">87%</div>
      <div class="stat-label">Accuracy</div>
    </div>
    <div class="stat-card">
      <div class="stat-icon">⚡</div>
      <div class="stat-value">+540</div>
      <div class="stat-label">XP Earned</div>
    </div>
    <div class="stat-card">
      <div class="stat-icon">❤️</div>
      <div class="stat-value">2 / 3</div>
      <div class="stat-label">Lives Left</div>
    </div>
  </div>

  <div class="rewards-section">
    <div class="rewards-label">Rewards</div>
    <div class="reward-row">
      <div class="reward-chip">
        <div class="reward-icon">💎</div>
        <div class="reward-info">
          <div class="reward-name">Gems</div>
          <div class="reward-value">+120</div>
        </div>
      </div>
      <div class="reward-chip">
        <div class="reward-icon">🥇</div>
        <div class="reward-info">
          <div class="reward-name">League XP</div>
          <div class="reward-value">+300</div>
        </div>
      </div>
    </div>
  </div>

  <div class="cta-area">
    <button class="btn-primary" onclick="location.href='compete.html'">🏆 Claim Reward</button>
    <button class="btn-secondary" onclick="location.href='compete.html'">Back to Compete</button>
  </div>

  <script>
    // Generate confetti
    const colors = ['#f59e0b','#22c55e','#7c3aed','#ef4444','#3b82f6','#fcd34d'];
    const container = document.getElementById('confetti');
    for (let i = 0; i < 40; i++) {
      const dot = document.createElement('div');
      dot.className = 'c-dot';
      const size = 6 + Math.random() * 8;
      dot.style.cssText = `
        width:${size}px; height:${size}px;
        left:${Math.random()*390}px;
        background:${colors[Math.floor(Math.random()*colors.length)]};
        animation-duration:${2+Math.random()*3}s;
        animation-delay:${Math.random()*2}s;
        top:-20px;
      `;
      container.appendChild(dot);
    }
  </script>
</body>
</html>
