<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=390, initial-scale=1.0" />
  <title>BJJ Mind — Feedback Correct</title>
  <script src="https://mcp.figma.com/mcp/html-to-design/capture.js" async></script>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 390px;
      height: 844px;
      background: #ffffff;
      font-family: 'Nunito', sans-serif;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    /* Background game screen (dimmed) */
    .bg-screen {
      flex: 1;
      display: flex;
      flex-direction: column;
      opacity: 0.3;
      pointer-events: none;
      overflow: hidden;
    }

    .topbar {
      display: flex;
      align-items: center;
      padding: 52px 24px 0;
      gap: 14px;
    }

    .close-btn {
      width: 32px; height: 32px;
      border-radius: 50%;
      background: #f9f8ff;
      border: 1.5px solid #ede9fe;
      display: flex; align-items: center; justify-content: center;
      font-size: 14px; color: #9ca3af;
    }

    .progress-bar-wrap {
      flex: 1; height: 10px;
      background: #f3f0ff; border-radius: 100px; overflow: hidden;
    }

    .progress-bar-fill {
      width: 50%; height: 100%;
      background: #7c3aed; border-radius: 100px;
    }

    .hearts { display: flex; gap: 2px; }
    .heart { font-size: 17px; }
    .heart.lost { opacity: 0.25; }

    .meta-row {
      display: flex; align-items: center; justify-content: space-between;
      padding: 16px 24px 12px;
    }

    .position-tag {
      background: #f5f0ff; border-radius: 100px;
      padding: 7px 16px; font-size: 13px; font-weight: 800; color: #7c3aed;
    }

    .timer-ring { position: relative; width: 52px; height: 52px; }
    .timer-ring svg { transform: rotate(-90deg); }
    .timer-number {
      position: absolute; inset: 0;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px; font-weight: 900; color: #22c55e;
    }

    .scene {
      margin: 0 20px;
      background: #f8f6ff; border-radius: 22px;
      height: 188px; border: 1.5px solid #ede9fe; overflow: hidden;
    }

    .options-bg {
      padding: 14px 20px 0;
      display: flex; flex-direction: column; gap: 10px;
    }

    .option-plain {
      width: 100%; height: 58px;
      border-radius: 16px; border: 2.5px solid #f3f4f6; background: #fff;
    }

    .option-correct {
      width: 100%; height: 58px;
      border-radius: 16px; border: 2.5px solid #86efac; background: #f0fdf4;
      display: flex; align-items: center; padding: 0 16px; gap: 12px;
    }

    /* Feedback sheet */
    .feedback-sheet {
      background: #f0fdf4;
      border-top: 3px solid #86efac;
      border-radius: 28px 28px 0 0;
      padding: 20px 24px 44px;
      flex-shrink: 0;
    }

    .sheet-top {
      display: flex;
      align-items: flex-start;
      gap: 16px;
      margin-bottom: 14px;
    }

    /* Gi Ghost character placeholder */
    .ghost-reaction {
      position: relative;
      flex-shrink: 0;
    }

    .ghost-avatar {
      width: 80px;
      height: 80px;
      border-radius: 22px;
      background: #dcfce7;
      border: 2.5px solid #86efac;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .ghost-avatar img {
      width: 70px;
      height: 70px;
      object-fit: contain;
    }

    .ghost-expression {
      position: absolute;
      bottom: -6px;
      right: -6px;
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background: #22c55e;
      border: 2.5px solid white;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
    }

    /* Expression label — for design handoff */
    .expression-label {
      position: absolute;
      top: -8px;
      left: 50%;
      transform: translateX(-50%);
      background: #16a34a;
      color: white;
      font-size: 8px;
      font-weight: 900;
      padding: 2px 6px;
      border-radius: 4px;
      white-space: nowrap;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .sheet-text { flex: 1; }

    .feedback-title {
      font-size: 22px;
      font-weight: 900;
      color: #16a34a;
      letter-spacing: -0.3px;
      line-height: 1;
    }

    .xp-badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      background: #7c3aed;
      color: white;
      font-size: 12px;
      font-weight: 900;
      padding: 3px 10px;
      border-radius: 100px;
      margin-top: 6px;
    }

    .feedback-rule {
      font-size: 15px;
      font-weight: 800;
      color: #14532d;
      line-height: 1.4;
      margin-bottom: 6px;
    }

    .feedback-explanation {
      font-size: 14px;
      font-weight: 600;
      color: #166534;
      line-height: 1.5;
      opacity: 0.8;
      margin-bottom: 18px;
    }

    .btn-continue {
      width: 100%;
      height: 58px;
      border-radius: 100px;
      background: #22c55e;
      border: none;
      color: #ffffff;
      font-family: 'Nunito', sans-serif;
      font-size: 17px;
      font-weight: 900;
      cursor: pointer;
      box-shadow: 0px 4px 0px #15803d;
    }
  </style>
</head>
<body>

  <!-- Background game screen (dimmed) -->
  <div class="bg-screen">
    <div class="topbar">
      <div class="close-btn">✕</div>
      <div class="progress-bar-wrap"><div class="progress-bar-fill"></div></div>
      <div class="hearts">
        <span class="heart">❤️</span><span class="heart">❤️</span>
        <span class="heart">❤️</span><span class="heart lost">❤️</span>
        <span class="heart lost">❤️</span>
      </div>
    </div>
    <div class="meta-row">
      <div class="position-tag">Bottom Side Control</div>
      <div class="timer-ring">
        <svg width="52" height="52" viewBox="0 0 52 52">
          <circle cx="26" cy="26" r="21" fill="none" stroke="#dcfce7" stroke-width="5"/>
          <circle cx="26" cy="26" r="21" fill="none" stroke="#22c55e" stroke-width="5"
            stroke-linecap="round" stroke-dasharray="131.9" stroke-dashoffset="0"/>
        </svg>
        <div class="timer-number">✓</div>
      </div>
    </div>
    <div class="scene">
      <svg width="100%" height="100%" viewBox="0 0 350 188" fill="none">
        <rect width="350" height="188" fill="#f8f6ff"/>
        <line x1="0" y1="62" x2="350" y2="62" stroke="#ede9fe" stroke-width="1"/>
        <line x1="0" y1="125" x2="350" y2="125" stroke="#ede9fe" stroke-width="1"/>
        <line x1="116" y1="0" x2="116" y2="188" stroke="#ede9fe" stroke-width="1"/>
        <line x1="232" y1="0" x2="232" y2="188" stroke="#ede9fe" stroke-width="1"/>
        <rect x="72" y="76" width="188" height="40" rx="20" fill="#3b82f6"/>
        <circle cx="272" cy="96" r="22" fill="#3b82f6"/>
        <rect x="126" y="28" width="40" height="110" rx="20" fill="#ef4444"/>
        <circle cx="146" cy="18" r="18" fill="#ef4444"/>
      </svg>
    </div>
    <div class="options-bg">
      <div class="option-plain"></div>
      <div class="option-correct">
        <div style="width:34px;height:34px;border-radius:10px;background:#dcfce7;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:900;color:#16a34a;flex-shrink:0;">B</div>
        <div style="font-size:15px;font-weight:700;color:#15803d;">Frame on their hip to create distance</div>
      </div>
    </div>
  </div>

  <!-- Feedback sheet -->
  <div class="feedback-sheet">
    <div class="sheet-top">

      <!-- Gi Ghost happy reaction -->
      <div class="ghost-reaction">
        <div class="expression-label">happy face</div>
        <div class="ghost-avatar">
          <img src="image 1.png" alt="Gi Ghost happy" />
        </div>
        <div class="ghost-expression">😄</div>
      </div>

      <div class="sheet-text">
        <div class="feedback-title">Correct!</div>
        <div class="xp-badge">⚡ +10 XP</div>
      </div>
    </div>

    <div class="feedback-rule">Hip frame = distance. Distance = you're safe.</div>
    <div class="feedback-explanation">Framing on the hip keeps their weight away and gives you space to recover guard. No frame — they complete the mount in seconds.</div>
    <button class="btn-continue">Continue</button>
  </div>

</body>
</html>
