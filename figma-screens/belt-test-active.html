<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=390, initial-scale=1.0" />
  <title>BJJ Mind — Belt Test Active</title>
  <script src="https://mcp.figma.com/mcp/html-to-design/capture.js" async></script>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 390px;
      height: 844px;
      background: #fffbeb;
      font-family: 'Nunito', sans-serif;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    /* Top bar — gold theme */
    .topbar {
      display: flex; align-items: center;
      padding: 52px 24px 0; gap: 14px; flex-shrink: 0;
    }

    .test-chip {
      background: #f59e0b;
      border-radius: 100px;
      padding: 6px 14px;
      font-size: 12px;
      font-weight: 900;
      color: white;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      box-shadow: 0 2px 0 #d97706;
    }

    .progress-bar-wrap {
      flex: 1; height: 10px;
      background: #fde68a; border-radius: 100px; overflow: hidden;
    }

    .progress-bar-fill {
      width: 56%; height: 100%;
      background: #f59e0b; border-radius: 100px;
    }

    .q-counter {
      font-size: 13px; font-weight: 900; color: #92400e;
      white-space: nowrap; flex-shrink: 0;
    }

    /* Meta row */
    .meta-row {
      display: flex; align-items: center; justify-content: space-between;
      padding: 16px 24px 0;
    }

    .tag-badge {
      background: #fef3c7; border: 1.5px solid #fde68a;
      border-radius: 100px; padding: 7px 16px;
      font-size: 13px; font-weight: 800; color: #92400e;
    }

    /* Timer ring — strict: 5s, already at 2s */
    .timer-ring { position: relative; width: 52px; height: 52px; }
    .timer-ring svg { transform: rotate(-90deg); }
    .timer-number {
      position: absolute; inset: 0;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px; font-weight: 900; color: #dc2626;
    }

    /* Scene */
    .scene {
      margin: 14px 20px 0;
      background: #fffbeb; border-radius: 22px;
      height: 190px; border: 1.5px solid #fde68a;
      overflow: hidden; flex-shrink: 0;
    }

    /* NO HINTS banner */
    .no-hints {
      margin: 10px 20px 0;
      background: #fef3c7;
      border: 1.5px solid #fde68a;
      border-radius: 12px;
      padding: 8px 14px;
      display: flex;
      align-items: center;
      gap: 8px;
      flex-shrink: 0;
    }

    .no-hints-text {
      font-size: 12px; font-weight: 800; color: #92400e;
    }

    /* Question */
    .question-area {
      padding: 14px 24px 10px; flex-shrink: 0;
    }

    .question-text {
      font-size: 18px; font-weight: 900; color: #1a1a2e;
      line-height: 1.3; letter-spacing: -0.3px;
    }

    /* Options */
    .options {
      padding: 0 20px; display: flex; flex-direction: column; gap: 10px;
      flex: 1;
    }

    .option-btn {
      width: 100%; min-height: 60px;
      border-radius: 18px; border: 2.5px solid #fde68a;
      background: #ffffff;
      display: flex; align-items: center; padding: 12px 16px; gap: 14px;
      cursor: pointer;
    }

    .option-letter {
      width: 36px; height: 36px;
      border-radius: 12px; background: #fef3c7;
      display: flex; align-items: center; justify-content: center;
      font-size: 15px; font-weight: 900; color: #92400e; flex-shrink: 0;
    }

    .option-text {
      font-size: 15px; font-weight: 700; color: #1a1a2e; line-height: 1.3;
    }
  </style>
</head>
<body>

  <!-- Topbar -->
  <div class="topbar">
    <div class="test-chip">🎯 Belt Test</div>
    <div class="progress-bar-wrap"><div class="progress-bar-fill"></div></div>
    <div class="q-counter">9 / 16</div>
  </div>

  <div class="meta-row">
    <div class="tag-badge">🛡️ Frames</div>
    <div class="timer-ring">
      <svg width="52" height="52" viewBox="0 0 52 52">
        <circle cx="26" cy="26" r="21" fill="none" stroke="#fde68a" stroke-width="5"/>
        <!-- 2s of 5s = 40% remaining → dashoffset = 131.9 × 0.6 = 79.1 -->
        <circle cx="26" cy="26" r="21" fill="none" stroke="#dc2626" stroke-width="5"
          stroke-linecap="round" stroke-dasharray="131.9" stroke-dashoffset="79.1"/>
      </svg>
      <div class="timer-number">2</div>
    </div>
  </div>

  <!-- Scene -->
  <div class="scene">
    <svg width="100%" height="100%" viewBox="0 0 350 190" fill="none">
      <rect width="350" height="190" fill="#fffbeb"/>
      <line x1="0" y1="63" x2="350" y2="63" stroke="#fde68a" stroke-width="1"/>
      <line x1="0" y1="127" x2="350" y2="127" stroke="#fde68a" stroke-width="1"/>
      <line x1="116" y1="0" x2="116" y2="190" stroke="#fde68a" stroke-width="1"/>
      <line x1="232" y1="0" x2="232" y2="190" stroke="#fde68a" stroke-width="1"/>
      <!-- YOU -->
      <rect x="65" y="82" width="196" height="44" rx="22" fill="#3b82f6"/>
      <circle cx="273" cy="104" r="24" fill="#3b82f6"/>
      <text x="160" y="109" font-family="Nunito" font-size="13" font-weight="900" fill="white" text-anchor="middle">YOU</text>
      <!-- OPP -->
      <rect x="136" y="30" width="44" height="130" rx="22" fill="#ef4444"/>
      <circle cx="158" cy="18" r="20" fill="#ef4444"/>
      <text x="158" y="104" font-family="Nunito" font-size="11" font-weight="900" fill="white" text-anchor="middle">OPP</text>
      <text x="14" y="22" font-family="Nunito" font-size="9" font-weight="800" fill="#d97706">TEST · TOP VIEW</text>
    </svg>
  </div>

  <!-- No hints warning -->
  <div class="no-hints">
    <span style="font-size:14px;">🚫</span>
    <div class="no-hints-text">Test mode — no hints. Trust your training.</div>
  </div>

  <div class="question-area">
    <div class="question-text">Opponent moves from side control to North-South. Your first frame goes where?</div>
  </div>

  <div class="options">
    <div class="option-btn">
      <div class="option-letter">A</div>
      <div class="option-text">Both hands on their hips</div>
    </div>
    <div class="option-btn">
      <div class="option-letter">B</div>
      <div class="option-text">One elbow frame, one grip on their wrist</div>
    </div>
  </div>

</body>
</html>
