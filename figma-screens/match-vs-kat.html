<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=390, initial-scale=1.0" />
  <title>BJJ Mind — Match vs Kat</title>
  <script src="https://mcp.figma.com/mcp/html-to-design/capture.js" async></script>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 390px;
      height: 844px;
      background: #1a1a2e;
      font-family: 'Nunito', sans-serif;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    /* Match header */
    .match-header {
      padding: 52px 24px 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .match-label {
      font-size: 11px;
      font-weight: 800;
      color: rgba(255,255,255,0.4);
      text-transform: uppercase;
      letter-spacing: 1.5px;
    }

    .match-round {
      font-size: 13px;
      font-weight: 800;
      color: rgba(255,255,255,0.5);
    }

    /* Score bar */
    .score-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 24px 0;
      gap: 12px;
    }

    .player-score {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      flex: 1;
    }

    .player-avatar {
      width: 64px;
      height: 64px;
      border-radius: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 34px;
      position: relative;
    }

    .player-avatar.you { background: #1e3a8a; border: 2.5px solid #3b82f6; }
    .player-avatar.kat { background: #7f1d1d; border: 2.5px solid #ef4444; }

    .avatar-art-label {
      position: absolute;
      bottom: -8px;
      left: 50%;
      transform: translateX(-50%);
      background: #7c3aed;
      color: white;
      font-size: 7px;
      font-weight: 900;
      padding: 1px 5px;
      border-radius: 3px;
      white-space: nowrap;
      text-transform: uppercase;
    }

    .player-name {
      font-size: 13px;
      font-weight: 900;
      color: rgba(255,255,255,0.7);
      margin-top: 6px;
    }

    .player-hearts {
      display: flex;
      gap: 3px;
    }

    .ph { font-size: 14px; }
    .ph.lost { opacity: 0.2; }

    /* Score display */
    .score-center {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
    }

    .score-display {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .score-num {
      font-size: 42px;
      font-weight: 900;
      color: white;
      line-height: 1;
    }

    .score-divider {
      font-size: 24px;
      font-weight: 900;
      color: rgba(255,255,255,0.3);
    }

    .round-indicator {
      font-size: 12px;
      font-weight: 700;
      color: rgba(255,255,255,0.4);
    }

    /* Progress dots */
    .progress-dots {
      display: flex;
      gap: 6px;
      justify-content: center;
      padding: 14px 0 0;
    }

    .pdot {
      width: 10px; height: 10px; border-radius: 50%;
    }

    .pdot.you-win { background: #3b82f6; }
    .pdot.kat-win { background: #ef4444; }
    .pdot.current { background: white; }
    .pdot.pending { background: rgba(255,255,255,0.2); }

    /* Divider */
    .divider {
      height: 1px;
      background: rgba(255,255,255,0.08);
      margin: 20px 24px 0;
    }

    /* Current question card */
    .question-card {
      margin: 16px 20px 0;
      background: white;
      border-radius: 24px;
      padding: 20px;
      flex-shrink: 0;
    }

    .q-label {
      font-size: 11px;
      font-weight: 800;
      color: #a78bfa;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 10px;
    }

    /* Mini scene in question card */
    .mini-scene {
      background: #f8f6ff;
      border-radius: 14px;
      height: 120px;
      margin-bottom: 12px;
      overflow: hidden;
      border: 1.5px solid #ede9fe;
    }

    .q-text {
      font-size: 16px;
      font-weight: 900;
      color: #1a1a2e;
      line-height: 1.3;
      margin-bottom: 14px;
    }

    /* Options */
    .options {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .opt {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 11px 14px;
      border-radius: 14px;
      border: 2px solid #ede9fe;
      background: white;
      cursor: pointer;
    }

    .opt-letter {
      width: 30px; height: 30px;
      border-radius: 9px; background: #f5f0ff;
      display: flex; align-items: center; justify-content: center;
      font-size: 13px; font-weight: 900; color: #7c3aed; flex-shrink: 0;
    }

    .opt-text {
      font-size: 14px; font-weight: 700; color: #1a1a2e; line-height: 1.2;
    }

    /* Timer at bottom */
    .timer-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      padding: 14px 24px 0;
      flex-shrink: 0;
    }

    .timer-ring { position: relative; width: 44px; height: 44px; }
    .timer-ring svg { transform: rotate(-90deg); }
    .timer-number {
      position: absolute; inset: 0;
      display: flex; align-items: center; justify-content: center;
      font-size: 15px; font-weight: 900; color: #f59e0b;
    }

    .timer-label {
      font-size: 13px; font-weight: 700; color: rgba(255,255,255,0.4);
    }
  </style>
</head>
<body>

  <!-- Match header -->
  <div class="match-header">
    <div class="match-label">vs Kat · Match</div>
    <div class="match-round">Question 3 of 5</div>
  </div>

  <!-- Score bar -->
  <div class="score-bar">
    <div class="player-score">
      <div class="player-avatar you">
        🥋
        <div class="avatar-art-label">Ghost art</div>
      </div>
      <div class="player-name">You</div>
      <div class="player-hearts">
        <span class="ph">❤️</span><span class="ph">❤️</span><span class="ph">❤️</span>
      </div>
    </div>

    <div class="score-center">
      <div class="score-display">
        <div class="score-num">2</div>
        <div class="score-divider">:</div>
        <div class="score-num" style="color: rgba(255,255,255,0.5);">0</div>
      </div>
      <div class="round-indicator">you're winning</div>
    </div>

    <div class="player-score">
      <div class="player-avatar kat">
        🥷
        <div class="avatar-art-label">Kat art</div>
      </div>
      <div class="player-name">Kat</div>
      <div class="player-hearts">
        <span class="ph">❤️</span><span class="ph lost">❤️</span><span class="ph lost">❤️</span>
      </div>
    </div>
  </div>

  <!-- Round dots -->
  <div class="progress-dots">
    <div class="pdot you-win"></div>
    <div class="pdot you-win"></div>
    <div class="pdot current"></div>
    <div class="pdot pending"></div>
    <div class="pdot pending"></div>
  </div>

  <div class="divider"></div>

  <!-- Current question -->
  <div class="question-card">
    <div class="q-label">Question 3</div>
    <div class="mini-scene">
      <svg width="100%" height="100%" viewBox="0 0 310 120" fill="none">
        <rect width="310" height="120" fill="#f8f6ff"/>
        <line x1="0" y1="60" x2="310" y2="60" stroke="#ede9fe" stroke-width="1"/>
        <line x1="103" y1="0" x2="103" y2="120" stroke="#ede9fe" stroke-width="1"/>
        <line x1="206" y1="0" x2="206" y2="120" stroke="#ede9fe" stroke-width="1"/>
        <rect x="55" y="46" width="160" height="36" rx="18" fill="#3b82f6"/>
        <circle cx="226" cy="64" r="20" fill="#3b82f6"/>
        <rect x="110" y="24" width="36" height="90" rx="18" fill="#ef4444"/>
        <circle cx="128" cy="14" r="18" fill="#ef4444"/>
        <text x="138" y="68" font-family="Nunito" font-size="11" font-weight="900" fill="white" text-anchor="middle">YOU</text>
        <text x="128" y="65" font-family="Nunito" font-size="9" font-weight="900" fill="white" text-anchor="middle">OPP</text>
        <text x="14" y="18" font-family="Nunito" font-size="8" font-weight="800" fill="#c4b5fd">TOP VIEW</text>
      </svg>
    </div>
    <div class="q-text">From bottom side control — your next move is?</div>
    <div class="options">
      <div class="opt" onclick="location.href='feedback-correct.html'" style="cursor:pointer">
        <div class="opt-letter">A</div>
        <div class="opt-text">Frame on the hip and shrimp away</div>
      </div>
      <div class="opt" onclick="location.href='feedback-wrong.html'" style="cursor:pointer">
        <div class="opt-letter">B</div>
        <div class="opt-text">Bridge hard toward opponent</div>
      </div>
    </div>
  </div>

  <!-- Timer -->
  <div class="timer-row">
    <div class="timer-ring">
      <svg width="44" height="44" viewBox="0 0 44 44">
        <circle cx="22" cy="22" r="17" fill="none" stroke="rgba(255,255,255,0.1)" stroke-width="4"/>
        <circle cx="22" cy="22" r="17" fill="none" stroke="#f59e0b" stroke-width="4"
          stroke-linecap="round" stroke-dasharray="106.8" stroke-dashoffset="53.4"/>
      </svg>
      <div class="timer-number">6</div>
    </div>
    <div class="timer-label">Kat is thinking too…</div>
  </div>

</body>
</html>
