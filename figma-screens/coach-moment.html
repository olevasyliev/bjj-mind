<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=390, initial-scale=1.0" />
  <title>BJJ Mind — Coach Moment</title>
  <script src="https://mcp.figma.com/mcp/html-to-design/capture.js" async></script>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 390px;
      height: 844px;
      background: #ffffff;
      font-family: 'Nunito', sans-serif;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    /* Dimmed game background */
    .bg-screen {
      flex: 1;
      background: #1a1a2e;
      opacity: 0.6;
      position: absolute;
      inset: 0;
    }

    /* Overlay */
    .overlay {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      height: 100%;
    }

    /* Progress bar stays visible */
    .topbar {
      display: flex;
      align-items: center;
      padding: 52px 24px 0;
      gap: 14px;
      opacity: 0.5;
    }

    .progress-bar-wrap {
      flex: 1; height: 10px;
      background: rgba(255,255,255,0.2); border-radius: 100px; overflow: hidden;
    }

    .progress-bar-fill {
      width: 50%; height: 100%;
      background: #a78bfa; border-radius: 100px;
    }

    .hearts { display: flex; gap: 2px; }
    .heart { font-size: 17px; }

    /* Coach card — slides up from bottom */
    .coach-card {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      background: white;
      border-radius: 32px 32px 0 0;
      padding: 28px 24px 52px;
      box-shadow: 0 -8px 40px rgba(0,0,0,0.18);
    }

    /* Coach header */
    .coach-header {
      display: flex;
      align-items: flex-end;
      gap: 16px;
      margin-bottom: 20px;
    }

    .coach-avatar {
      width: 88px;
      height: 88px;
      border-radius: 26px;
      background: #f5f0ff;
      border: 2.5px solid #ddd6fe;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      position: relative;
    }

    .coach-avatar-emoji {
      font-size: 52px;
      line-height: 1;
    }

    /* Placeholder label for character art */
    .art-label {
      position: absolute;
      top: -9px;
      left: 50%;
      transform: translateX(-50%);
      background: #7c3aed;
      color: white;
      font-size: 8px;
      font-weight: 900;
      padding: 2px 6px;
      border-radius: 4px;
      white-space: nowrap;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .speech-bubble {
      flex: 1;
      background: #f5f0ff;
      border-radius: 18px 18px 18px 4px;
      padding: 14px 16px;
      position: relative;
    }

    .speech-bubble::before {
      content: '';
      position: absolute;
      bottom: 16px;
      left: -8px;
      width: 0; height: 0;
      border-top: 8px solid transparent;
      border-right: 10px solid #f5f0ff;
      border-bottom: 0;
    }

    .coach-name {
      font-size: 11px;
      font-weight: 900;
      color: #7c3aed;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 5px;
    }

    .coach-quote {
      font-size: 17px;
      font-weight: 700;
      color: #1a1a2e;
      line-height: 1.45;
    }

    /* Key insight */
    .insight-card {
      background: #fafafa;
      border: 1.5px solid #f3f4f6;
      border-radius: 18px;
      padding: 16px;
      margin-bottom: 20px;
    }

    .insight-title {
      font-size: 11px;
      font-weight: 800;
      color: #a78bfa;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 8px;
    }

    .insight-rule {
      font-size: 16px;
      font-weight: 900;
      color: #1a1a2e;
      line-height: 1.3;
      margin-bottom: 4px;
    }

    .insight-detail {
      font-size: 13px;
      font-weight: 600;
      color: #6b7280;
      line-height: 1.5;
    }

    /* Tags */
    .insight-tags {
      display: flex;
      gap: 6px;
      margin-top: 10px;
    }

    .tag {
      background: #f5f0ff;
      border-radius: 100px;
      padding: 4px 12px;
      font-size: 12px;
      font-weight: 800;
      color: #7c3aed;
    }

    .btn-continue {
      width: 100%;
      height: 58px;
      border-radius: 100px;
      background: #7c3aed;
      border: none;
      color: white;
      font-family: 'Nunito', sans-serif;
      font-size: 17px;
      font-weight: 900;
      cursor: pointer;
      box-shadow: 0px 4px 0px #5b21b6;
    }
  </style>
</head>
<body>

  <div class="bg-screen"></div>

  <div class="overlay">
    <!-- Dimmed progress bar -->
    <div class="topbar">
      <div class="progress-bar-wrap"><div class="progress-bar-fill"></div></div>
      <div class="hearts">
        <span class="heart">❤️</span><span class="heart">❤️</span>
        <span class="heart">❤️</span>
      </div>
    </div>

    <!-- Coach card slides up -->
    <div class="coach-card">

      <div class="coach-header">
        <!-- Marco character — placeholder -->
        <div class="coach-avatar">
          <div class="art-label">Marco art</div>
          <div class="coach-avatar-emoji">🥋</div>
        </div>

        <!-- Speech bubble -->
        <div class="speech-bubble">
          <div class="coach-name">Marco · Coach tip</div>
          <div class="coach-quote">"Before you move — always ask: do I have a frame? No frame means no escape."</div>
        </div>
      </div>

      <!-- Key principle card -->
      <div class="insight-card">
        <div class="insight-title">The principle</div>
        <div class="insight-rule">Frame first, move second.</div>
        <div class="insight-detail">A frame creates distance and buys you time. Without it, any escape attempt gets you flattened deeper into the position.</div>
        <div class="insight-tags">
          <span class="tag">🛡️ Frames</span>
          <span class="tag">🌀 Escapes</span>
        </div>
      </div>

      <button class="btn-continue">Got it — keep going</button>
    </div>
  </div>

</body>
</html>
