<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=390, initial-scale=1.0" />
  <title>BJJ Mind — Tournament Lose</title>
  <script src="https://mcp.figma.com/mcp/html-to-design/capture.js" async></script>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { width: 390px; height: 844px; background: #0a0a14; font-family: 'Nunito', sans-serif; overflow: hidden; display: flex; flex-direction: column; align-items: center; }

    .result-area {
      padding-top: 52px;
      display: flex; flex-direction: column; align-items: center;
      gap: 0; flex-shrink: 0;
    }

    .ghost-wrap {
      width: 100px; height: 100px; border-radius: 28px;
      background: rgba(239,68,68,0.12); border: 2px solid rgba(239,68,68,0.3);
      display: flex; align-items: center; justify-content: center;
      font-size: 56px;
      animation: sadBob 3s ease-in-out infinite;
    }
    @keyframes sadBob {
      0%,100% { transform: translateY(0) rotate(-3deg); }
      50%      { transform: translateY(-5px) rotate(3deg); }
    }

    .result-label {
      font-size: 11px; font-weight: 900;
      color: #ef4444; text-transform: uppercase;
      letter-spacing: 3px; margin-top: 12px;
    }
    .result-title {
      font-size: 44px; font-weight: 900;
      color: #ef4444; letter-spacing: -1px; line-height: 1; margin-top: 4px;
    }
    .result-sub {
      font-size: 14px; font-weight: 700;
      color: rgba(255,255,255,0.35); margin-top: 6px; text-align: center;
      padding: 0 40px;
    }

    /* Bracket strip */
    .bracket-strip { display: flex; align-items: center; justify-content: center; gap: 6px; padding: 18px 24px 0; width: 100%; flex-shrink: 0; }
    .bracket-node { display: flex; flex-direction: column; align-items: center; gap: 4px; }
    .b-match { width: 44px; height: 36px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 900; }
    .b-match.win  { background: #1a3a1a; border: 2px solid #22c55e; color: #22c55e; }
    .b-match.loss { background: #3a1a1a; border: 2px solid #ef4444; color: #ef4444; }
    .b-match.locked { background: rgba(255,255,255,0.04); border: 2px solid rgba(255,255,255,0.08); color: rgba(255,255,255,0.15); }
    .b-label { font-size: 9px; font-weight: 800; color: rgba(255,255,255,0.3); text-transform: uppercase; letter-spacing: 0.5px; }
    .b-label.loss { color: #ef4444; }
    .bracket-arrow { font-size: 14px; color: rgba(255,255,255,0.15); margin-bottom: 14px; }

    /* Stats */
    .stats-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; padding: 16px 20px 0; width: 100%; flex-shrink: 0; }
    .stat-card { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.08); border-radius: 16px; padding: 14px 10px; text-align: center; }
    .stat-icon  { font-size: 22px; margin-bottom: 6px; }
    .stat-value { font-size: 20px; font-weight: 900; color: white; }
    .stat-label { font-size: 9px; font-weight: 800; color: rgba(255,255,255,0.3); text-transform: uppercase; letter-spacing: 0.5px; margin-top: 2px; }

    /* Coach note */
    .coach-note {
      margin: 16px 20px 0; width: calc(100% - 40px);
      background: rgba(124,58,237,0.1); border: 1.5px solid rgba(124,58,237,0.25);
      border-radius: 18px; padding: 16px; flex-shrink: 0;
      display: flex; gap: 12px; align-items: flex-start;
    }
    .coach-avatar { font-size: 32px; flex-shrink: 0; }
    .coach-body { flex: 1; }
    .coach-name  { font-size: 10px; font-weight: 900; color: #a78bfa; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 4px; }
    .coach-text  { font-size: 14px; font-weight: 700; color: rgba(255,255,255,0.75); line-height: 1.45; }

    /* XP partial reward */
    .partial-reward {
      margin: 12px 20px 0; width: calc(100% - 40px);
      background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1);
      border-radius: 14px; padding: 12px 16px;
      display: flex; align-items: center; gap: 12px; flex-shrink: 0;
    }
    .partial-icon  { font-size: 24px; flex-shrink: 0; }
    .partial-text  { flex: 1; font-size: 13px; font-weight: 700; color: rgba(255,255,255,0.5); }
    .partial-value { font-size: 16px; font-weight: 900; color: white; }

    /* CTAs */
    .cta-area { width: 100%; padding: 16px 20px 0; flex-shrink: 0; display: flex; flex-direction: column; gap: 10px; }
    .btn-primary { width: 100%; height: 58px; border-radius: 100px; background: #ef4444; border: none; color: white; font-family: 'Nunito', sans-serif; font-size: 18px; font-weight: 900; cursor: pointer; box-shadow: 0 5px 0 #b91c1c; }
    .btn-secondary { width: 100%; height: 50px; border-radius: 100px; background: transparent; border: 1.5px solid rgba(255,255,255,0.15); color: rgba(255,255,255,0.5); font-family: 'Nunito', sans-serif; font-size: 15px; font-weight: 800; cursor: pointer; }
  </style>
</head>
<body>

  <div class="result-area">
    <div class="ghost-wrap">😔</div>
    <div class="result-label">Tournament Over</div>
    <div class="result-title">DEFEATED</div>
    <div class="result-sub">You ran out of lives in Match 3</div>
  </div>

  <div class="bracket-strip">
    <div class="bracket-node"><div class="b-match win">W</div><div class="b-label">1</div></div>
    <div class="bracket-arrow">›</div>
    <div class="bracket-node"><div class="b-match win">W</div><div class="b-label">2</div></div>
    <div class="bracket-arrow">›</div>
    <div class="bracket-node"><div class="b-match loss">✕</div><div class="b-label loss">3</div></div>
    <div class="bracket-arrow">›</div>
    <div class="bracket-node"><div class="b-match locked">4</div><div class="b-label">4</div></div>
    <div class="bracket-arrow">›</div>
    <div class="bracket-node"><div class="b-match locked">🏆</div><div class="b-label">Final</div></div>
  </div>

  <div class="stats-grid">
    <div class="stat-card">
      <div class="stat-icon">🎯</div>
      <div class="stat-value">62%</div>
      <div class="stat-label">Accuracy</div>
    </div>
    <div class="stat-card">
      <div class="stat-icon">⚔️</div>
      <div class="stat-value">2 / 5</div>
      <div class="stat-label">Wins</div>
    </div>
    <div class="stat-card">
      <div class="stat-icon">❤️</div>
      <div class="stat-value">0 / 3</div>
      <div class="stat-label">Lives</div>
    </div>
  </div>

  <div class="coach-note">
    <div class="coach-avatar">👨‍🏫</div>
    <div class="coach-body">
      <div class="coach-name">Marco</div>
      <div class="coach-text">Every loss is data. You got caught on guard passing questions — that's your focus for this week.</div>
    </div>
  </div>

  <div class="partial-reward">
    <div class="partial-icon">⚡</div>
    <div class="partial-text">Partial XP for 2 match wins</div>
    <div class="partial-value">+210</div>
  </div>

  <div class="cta-area">
    <button class="btn-primary" onclick="location.href='compete.html'">🔄 Try Again</button>
    <button class="btn-secondary" onclick="location.href='compete.html'">Back to Compete</button>
  </div>

</body>
</html>
