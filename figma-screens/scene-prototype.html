<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BJJ Mind — 3D Position Viewer</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@600;700;800&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0A0B14; overflow: hidden; font-family: 'Nunito', sans-serif; }
    canvas { display: block; }

    #scene-label {
      position: fixed; top: 28px; left: 50%; transform: translateX(-50%);
      text-align: center; pointer-events: none;
    }
    #scene-label .title { font-size: 22px; font-weight: 800; color: #F9FAFB; letter-spacing: -0.3px; }
    #scene-label .subtitle { font-size: 13px; font-weight: 600; color: #6B7280; margin-top: 2px; }

    #scene-nav {
      position: fixed; bottom: 36px; left: 50%; transform: translateX(-50%);
      display: flex; gap: 10px;
      background: rgba(17,19,31,0.85); backdrop-filter: blur(16px);
      border: 1px solid rgba(255,255,255,0.08); border-radius: 20px; padding: 8px 12px;
    }
    .scene-btn {
      padding: 9px 18px; border-radius: 14px; border: none;
      font-family: 'Nunito', sans-serif; font-size: 13px; font-weight: 700;
      cursor: pointer; transition: all 0.2s ease; background: transparent; color: #9CA3AF;
    }
    .scene-btn:hover { color: #E5E7EB; background: rgba(255,255,255,0.06); }
    .scene-btn.active { background: #7C3AED; color: #fff; }
    #trans-nav {
      position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%);
      display: flex; gap: 8px; opacity: 0; transition: opacity 0.3s;
    }
    #trans-nav.visible { opacity: 1; }
    .trans-btn {
      padding: 7px 14px; border-radius: 12px; border: 1px solid rgba(124,58,237,0.4);
      font-family: 'Nunito', sans-serif; font-size: 12px; font-weight: 700;
      cursor: pointer; transition: all 0.2s ease;
      background: rgba(124,58,237,0.15); color: #A78BFA;
    }
    .trans-btn:hover { background: rgba(124,58,237,0.35); color: #fff; }
    .trans-btn.playing { background: #7C3AED; color: #fff; border-color: #7C3AED; }
    #hint {
      position: fixed; bottom: 160px; left: 50%; transform: translateX(-50%);
      color: #374151; font-size: 12px; font-weight: 600; letter-spacing: 0.5px;
      pointer-events: none; transition: opacity 0.5s;
    }
  </style>
</head>
<body>

<div id="scene-label">
  <div class="title" id="label-title">Side Control</div>
  <div class="subtitle">Drag to rotate &bull; Scroll to zoom</div>
</div>
<div id="trans-nav"></div>
<div id="scene-nav">
  <button class="scene-btn active" data-scene="side_control">Side Control</button>
  <button class="scene-btn" data-scene="mount">Mount</button>
  <button class="scene-btn" data-scene="closed_guard">Closed Guard</button>
  <button class="scene-btn" data-scene="back_mount">Back Mount</button>
</div>
<div id="hint">DRAG TO ROTATE</div>

// ─────────────────────────────────────────────────────────────────────────────
// Gi textures — pearl weave canvas pattern
// ─────────────────────────────────────────────────────────────────────────────

function createPearlWeave(hexColor, size = 64) {
  const canvas = document.createElement('canvas');
  canvas.width = canvas.height = size;
  const ctx = canvas.getContext('2d');

  const r = (hexColor >> 16) & 0xFF;
  const g = (hexColor >> 8)  & 0xFF;
  const b =  hexColor        & 0xFF;

  ctx.fillStyle = `rgb(${r},${g},${b})`;
  ctx.fillRect(0, 0, size, size);

  const cW = 7, cH = 5;
  for (let row = 0; row <= size / cH + 1; row++) {
    const ox = (row % 2) * (cW / 2);
    for (let col = 0; col <= size / cW + 1; col++) {
      const cx = col * cW + ox;
      const cy = row * cH;
      // Shadow bump
      ctx.fillStyle = 'rgba(0,0,0,0.22)';
      ctx.beginPath();
      ctx.ellipse(cx, cy + 0.9, cW * 0.36, cH * 0.32, 0, 0, Math.PI * 2);
      ctx.fill();
      // Specular highlight
      ctx.fillStyle = 'rgba(255,255,255,0.14)';
      ctx.beginPath();
      ctx.ellipse(cx - 0.6, cy - 0.8, cW * 0.18, cH * 0.15, -0.4, 0, Math.PI * 2);
      ctx.fill();
    }
  }

  const tex = new THREE.CanvasTexture(canvas);
  tex.wrapS = tex.wrapT = THREE.RepeatWrapping;
  tex.repeat.set(5, 5);
  return tex;
}

// Pre-built texture cache — filled in initTextures()
const TEX = {};
function initTextures() {
  TEX.blueJacket  = createPearlWeave(0x1E40AF);
  TEX.bluePants   = createPearlWeave(0x152F8A);
  TEX.whiteJacket = createPearlWeave(0xE8E8DE);
  TEX.whitePants  = createPearlWeave(0xE0E0D6);
}

const AMBER      = new THREE.Color(0xF59E0B);
const AMBER_EMIT = new THREE.Color(0xC07000);
const MAT_CACHE  = {};

function makeGiMat(isBlue, zone, highlight = false) {
  if (highlight) {
    return new THREE.MeshStandardMaterial({
      color: AMBER, roughness: 0.72, metalness: 0.0,
      emissive: AMBER_EMIT, emissiveIntensity: 0.3,
    });
  }
  const key = `${isBlue ? 'b' : 'w'}_${zone}`;
  if (!MAT_CACHE[key]) {
    const isJacket = zone === 'jacket';
    MAT_CACHE[key] = new THREE.MeshStandardMaterial({
      map: isBlue
        ? (isJacket ? TEX.blueJacket  : TEX.bluePants)
        : (isJacket ? TEX.whiteJacket : TEX.whitePants),
      roughness: 0.82, metalness: 0.0,
    });
  }
  return MAT_CACHE[key];
}

// Geometry helpers
// ─────────────────────────────────────────────────────────────────────────────

const _up = new THREE.Vector3(0, 1, 0);
const _d  = new THREE.Vector3();
const _q  = new THREE.Quaternion();

function capsuleBetween(pA, pB, radius, mat, group) {
  _d.set(pB[0]-pA[0], pB[1]-pA[1], pB[2]-pA[2]);
  const len = _d.length();
  if (len < 0.004) return;

  const mesh = new THREE.Mesh(
    new THREE.CapsuleGeometry(radius, Math.max(0.002, len - radius * 1.4), 4, 12),
    mat
  );
  mesh.position.set((pA[0]+pB[0])/2, (pA[1]+pB[1])/2, (pA[2]+pB[2])/2);
  _d.normalize();
  const dot = _d.dot(_up);
  if (Math.abs(dot) > 0.9999) {
    if (dot < 0) mesh.quaternion.setFromAxisAngle(new THREE.Vector3(1,0,0), Math.PI);
  } else {
    _q.setFromUnitVectors(_up, _d);
    mesh.quaternion.copy(_q);
  }
  mesh.castShadow = true;
  group.add(mesh);
}

function sphereAt(pos, radius, mat, group) {
  const mesh = new THREE.Mesh(new THREE.SphereGeometry(radius, 16, 12), mat);
  mesh.position.set(pos[0], pos[1], pos[2]);
  mesh.castShadow = true;
  group.add(mesh);
}

const humanoids = new THREE.Group();
scene3d.add(humanoids);

function buildPlayer(joints, isBlue, highlightSet) {
  // Limbs with zone-aware gi materials
  LIMBS.forEach(([jA, jB, radius], i) => {
    const hl   = highlightSet.has(jA) || highlightSet.has(jB);
    const zone = LIMB_ZONE[i] || 'jacket';
    capsuleBetween(joints[jA], joints[jB], radius, makeGiMat(isBlue, zone, hl), humanoids);
  });

  // Smooth joint spheres at knees + elbows
  [[6, 0.065, 'pants'], [7, 0.065, 'pants'], [12, 0.038, 'jacket'], [13, 0.038, 'jacket']]
    .forEach(([idx, r, zone]) => sphereAt(joints[idx], r, makeGiMat(isBlue, zone, highlightSet.has(idx)), humanoids));

  // Head sphere
  sphereAt(joints[22], 0.108, makeGiMat(isBlue, 'jacket', highlightSet.has(22)), humanoids);

}

// Scene management
// ─────────────────────────────────────────────────────────────────────────────

function sceneCenter(pos) {
  let x=0,y=0,z=0,n=0;
  for (const p of pos.players) for (const [px,py,pz] of p) { x+=px; y+=py; z+=pz; n++; }
  return new THREE.Vector3(x/n, y/n, z/n);
}

function loadScene(id) {
  const pos    = POSITIONS[id];
  const p0Blue = (id === 'closed_guard');

  if (toJoints === null) {
    // First load — snap immediately
    toJoints   = pos.players;
    fromJoints = pos.players;
    animT      = 1.0;
    animP0Blue = p0Blue;
    rebuildHumanoids(pos.players, p0Blue);
  } else {
    // Animated transition — capture current rendered state
    const t = easeInOutCubic(Math.min(animT, 1.0));
    fromJoints = (animT < 1.0)
      ? lerpJoints(fromJoints, toJoints, t)
      : toJoints;
    toJoints   = pos.players;
    animT      = 0.0;
    animP0Blue = p0Blue;
  }

  // Move camera to new scene
  const center = sceneCenter(pos);
  const lo = pos.lookOffset, co = pos.camOffset;
  controls.target.set(center.x + lo[0], center.y + lo[1], center.z + lo[2]);
  camera.position.set(center.x + co[0], center.y + co[1], center.z + co[2]);
  controls.update();

  transPlaying = false;
  document.getElementById('label-title').textContent = pos.label;
  document.querySelectorAll('.scene-btn').forEach(b => b.classList.toggle('active', b.dataset.scene === id));
  updateTransNav(id);
}

// ─────────────────────────────────────────────────────────────────────────────
// UI + resize + render loop
// ─────────────────────────────────────────────────────────────────────────────

document.querySelectorAll('.scene-btn').forEach(btn => btn.addEventListener('click', () => loadScene(btn.dataset.scene)));

let hintGone = false;
renderer.domElement.addEventListener('mousedown', () => {
  if (!hintGone) { document.getElementById('hint').style.opacity = '0'; hintGone = true; }
});

window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

const clock = new THREE.Clock();
let fromJoints   = null;
let toJoints     = null;
let animT        = 1.0;
let animP0Blue   = false;
const ANIM_DUR   = 0.9;

// Technique playback state
let transFrames  = null;
let transFrameIdx = 0;
let transFrameT  = 0;
let transP0Blue  = false;
let transPlaying = false;
const FRAME_DUR  = 0.13; // seconds per frame

function easeInOutCubic(t) {
  return t < 0.5 ? 4*t*t*t : 1 - Math.pow(-2*t+2,3)/2;
}

function lerpJoints(a, b, t) {
  return a.map((player, pi) =>
    player.map((j, ji) => [
      j[0] + (b[pi][ji][0]-j[0])*t,
      j[1] + (b[pi][ji][1]-j[1])*t,
      j[2] + (b[pi][ji][2]-j[2])*t,
    ])
  );
}

function rebuildHumanoids(joints, p0Blue) {
  humanoids.clear();
  buildPlayer(joints[0], p0Blue,  new Set());
  buildPlayer(joints[1], !p0Blue, new Set());
}

function playTransition(key) {
  const tr = TRANSITIONS[key];
  transFrames   = tr.frames;
  transFrameIdx = 0;
  transFrameT   = 0;
  transP0Blue   = (tr.scene === 'closed_guard');
  transPlaying  = true;
  animT = 1.0; // pause scene lerp
  document.querySelectorAll('.trans-btn').forEach(b => {
    b.classList.toggle('playing', b.dataset.trans === key);
  });
}

function stopTransition() {
  transPlaying = false;
  document.querySelectorAll('.trans-btn').forEach(b => b.classList.remove('playing'));
}

function updateTransNav(sceneId) {
  const nav = document.getElementById('trans-nav');
  nav.innerHTML = '';
  const relevant = Object.entries(TRANSITIONS).filter(([, tr]) => tr.scene === sceneId);
  if (relevant.length === 0) { nav.classList.remove('visible'); return; }
  relevant.forEach(([key, tr]) => {
    const btn = document.createElement('button');
    btn.className = 'trans-btn';
    btn.dataset.trans = key;
    btn.textContent = '▶ ' + tr.label;
    btn.addEventListener('click', () => {
      if (btn.classList.contains('playing')) stopTransition();
      else playTransition(key);
    });
    nav.appendChild(btn);
  });
  nav.classList.add('visible');
}

function animate() {
  requestAnimationFrame(animate);
  const dt = clock.getDelta();
  controls.update();

  if (transPlaying) {
    transFrameT += dt / FRAME_DUR;
    while (transFrameT >= 1.0 && transFrameIdx < transFrames.length - 2) {
      transFrameT -= 1.0;
      transFrameIdx++;
    }
    if (transFrameIdx >= transFrames.length - 1) {
      // Last frame reached — hold and stop
      rebuildHumanoids(transFrames[transFrames.length - 1], transP0Blue);
      transPlaying = false;
      document.querySelectorAll('.trans-btn').forEach(b => b.classList.remove('playing'));
    } else {
      const t = easeInOutCubic(Math.min(transFrameT, 1.0));
      const joints = lerpJoints(transFrames[transFrameIdx], transFrames[transFrameIdx + 1], t);
      rebuildHumanoids(joints, transP0Blue);
    }
  } else if (animT < 1.0) {
    animT = Math.min(1.0, animT + dt / ANIM_DUR);
    const joints = lerpJoints(fromJoints, toJoints, easeInOutCubic(animT));
    rebuildHumanoids(joints, animP0Blue);
  }

  renderer.render(scene3d, camera);
}

// ─────────────────────────────────────────────────────────────────────────────
// Boot
// ─────────────────────────────────────────────────────────────────────────────

initTextures();
loadScene('side_control');
animate();
</script>
</body>
</html>
