// ─────────────────────────────────────────────────────────────────────────────
// Gi textures — pearl weave canvas pattern
// ─────────────────────────────────────────────────────────────────────────────

function createPearlWeave(hexColor, size = 64) {
  const canvas = document.createElement('canvas');
  canvas.width = canvas.height = size;
  const ctx = canvas.getContext('2d');

  const r = (hexColor >> 16) & 0xFF;
  const g = (hexColor >> 8)  & 0xFF;
  const b =  hexColor        & 0xFF;

  ctx.fillStyle = `rgb(${r},${g},${b})`;
  ctx.fillRect(0, 0, size, size);

  const cW = 7, cH = 5;
  for (let row = 0; row <= size / cH + 1; row++) {
    const ox = (row % 2) * (cW / 2);
    for (let col = 0; col <= size / cW + 1; col++) {
      const cx = col * cW + ox;
      const cy = row * cH;
      // Shadow bump
      ctx.fillStyle = 'rgba(0,0,0,0.22)';
      ctx.beginPath();
      ctx.ellipse(cx, cy + 0.9, cW * 0.36, cH * 0.32, 0, 0, Math.PI * 2);
      ctx.fill();
      // Specular highlight
      ctx.fillStyle = 'rgba(255,255,255,0.14)';
      ctx.beginPath();
      ctx.ellipse(cx - 0.6, cy - 0.8, cW * 0.18, cH * 0.15, -0.4, 0, Math.PI * 2);
      ctx.fill();
    }
  }

  const tex = new THREE.CanvasTexture(canvas);
  tex.wrapS = tex.wrapT = THREE.RepeatWrapping;
  tex.repeat.set(5, 5);
  return tex;
}

// Pre-built texture cache — filled in initTextures()
const TEX = {};
function initTextures() {
  TEX.blueJacket  = createPearlWeave(0x1E40AF);
  TEX.bluePants   = createPearlWeave(0x152F8A);
  TEX.whiteJacket = createPearlWeave(0xE8E8DE);
  TEX.whitePants  = createPearlWeave(0xCDD2DE);
}

const AMBER      = new THREE.Color(0xF59E0B);
const AMBER_EMIT = new THREE.Color(0xC07000);
const MAT_CACHE  = {};

function makeGiMat(isBlue, zone, highlight = false) {
  if (highlight) {
    return new THREE.MeshStandardMaterial({
      color: AMBER, roughness: 0.25, metalness: 0.02,
      emissive: AMBER_EMIT, emissiveIntensity: 0.6,
    });
  }
  const key = `${isBlue ? 'b' : 'w'}_${zone}`;
  if (!MAT_CACHE[key]) {
    const isJacket = zone === 'jacket';
    MAT_CACHE[key] = new THREE.MeshStandardMaterial({
      map: isBlue
        ? (isJacket ? TEX.blueJacket  : TEX.bluePants)
        : (isJacket ? TEX.whiteJacket : TEX.whitePants),
      roughness: 0.82, metalness: 0.0,
    });
  }
  return MAT_CACHE[key];
}

// ─────────────────────────────────────────────────────────────────────────────
// Geometry helpers
// ─────────────────────────────────────────────────────────────────────────────

const _up = new THREE.Vector3(0, 1, 0);
const _d  = new THREE.Vector3();
const _q  = new THREE.Quaternion();

function capsuleBetween(pA, pB, radius, mat, group) {
  _d.set(pB[0]-pA[0], pB[1]-pA[1], pB[2]-pA[2]);
  const len = _d.length();
  if (len < 0.004) return;

  const mesh = new THREE.Mesh(
    new THREE.CapsuleGeometry(radius, Math.max(0.002, len - radius * 1.4), 4, 12),
    mat
  );
  mesh.position.set((pA[0]+pB[0])/2, (pA[1]+pB[1])/2, (pA[2]+pB[2])/2);
  _d.normalize();
  const dot = _d.dot(_up);
  if (Math.abs(dot) > 0.9999) {
    if (dot < 0) mesh.quaternion.setFromAxisAngle(new THREE.Vector3(1,0,0), Math.PI);
  } else {
    _q.setFromUnitVectors(_up, _d);
    mesh.quaternion.copy(_q);
  }
  mesh.castShadow = true;
  group.add(mesh);
}

function sphereAt(pos, radius, mat, group) {
  const mesh = new THREE.Mesh(new THREE.SphereGeometry(radius, 16, 12), mat);
  mesh.position.set(pos[0], pos[1], pos[2]);
  mesh.castShadow = true;
  group.add(mesh);
}

// ─────────────────────────────────────────────────────────────────────────────
// Gi details — collar (V-lapel) + belt
// ─────────────────────────────────────────────────────────────────────────────

function addGiDetails(joints, isBlue, group) {
  const v = (i) => new THREE.Vector3(joints[i][0], joints[i][1], joints[i][2]);

  const neck = v(21), core = v(20);
  const lSh  = v(10), rSh  = v(11);

  // Build orthonormal torso frame
  const spineDir = new THREE.Vector3().subVectors(neck, core).normalize();
  const rawRight = new THREE.Vector3().subVectors(rSh, lSh).normalize();
  // frontDir = cross(spineDir, rawRight), then ensure it points somewhat upward (away from mat)
  const frontDir = new THREE.Vector3().crossVectors(spineDir, rawRight).normalize();
  if (frontDir.y < 0) frontDir.negate();
  // Recompute rightDir to be orthogonal to both
  const rightDir = new THREE.Vector3().crossVectors(spineDir, frontDir).normalize();

  const torsoLen  = neck.distanceTo(core);
  const shoulderW = lSh.distanceTo(rSh);
  const bodyR     = shoulderW * 0.30;       // approximate torso radius
  const surfOff   = bodyR + 0.01;           // slight surface offset for collar

  // ── Collar (V-lapel) ──────────────────────────────────────────────────────
  // Collar color: slightly lighter/brighter than jacket base
  const collarHex = isBlue ? 0x2B5CE6 : 0xF8F8F0;
  const collarMat = new THREE.MeshStandardMaterial({
    color: collarHex, roughness: 0.60, metalness: 0.0,
  });

  // Collar starts 20% below neck, ends 75% down torso
  const collarTop  = new THREE.Vector3().lerpVectors(neck, core, 0.18);
  const collarBase = new THREE.Vector3().lerpVectors(neck, core, 0.72);

  // Add surface offset so collar sits on body
  collarTop .addScaledVector(frontDir, surfOff);
  collarBase.addScaledVector(frontDir, surfOff * 0.7);

  // Left collar strip — angled out toward left shoulder
  const cL = collarTop.clone().addScaledVector(rightDir, -shoulderW * 0.14);
  // Right collar strip — angled out toward right shoulder
  const cR = collarTop.clone().addScaledVector(rightDir,  shoulderW * 0.14);

  capsuleBetween(cL.toArray(), collarBase.toArray(), 0.021, collarMat, group);
  capsuleBetween(cR.toArray(), collarBase.toArray(), 0.021, collarMat, group);

  // ── Belt ──────────────────────────────────────────────────────────────────
  const beltCenter = core.clone().addScaledVector(spineDir, -0.04);
  const bR = bodyR * 1.18;  // belt radius just outside torso

  const beltPts = [];
  for (let i = 0; i < 64; i++) {
    const angle = (i / 64) * Math.PI * 2;
    beltPts.push(
      beltCenter.clone()
        .addScaledVector(rightDir, Math.cos(angle) * bR)
        .addScaledVector(frontDir, Math.sin(angle) * bR * 0.78)  // slightly elliptical
    );
  }

  const beltMat = new THREE.MeshStandardMaterial({
    color: isBlue ? 0xF0F0E8 : 0xF0F0E8,  // white belt for both (beginner)
    roughness: 0.65, metalness: 0.0,
  });

  const beltCurve = new THREE.CatmullRomCurve3(beltPts, true);
  const beltMesh  = new THREE.Mesh(
    new THREE.TubeGeometry(beltCurve, 64, 0.019, 8, true),
    beltMat
  );
  beltMesh.castShadow = true;
  group.add(beltMesh);
}

function buildPlayer(joints, isBlue, highlightSet) {
  // Limbs with zone-aware gi materials
  LIMBS.forEach(([jA, jB, radius], i) => {
    const hl   = highlightSet.has(jA) || highlightSet.has(jB);
    const zone = LIMB_ZONE[i] || 'jacket';
    capsuleBetween(joints[jA], joints[jB], radius, makeGiMat(isBlue, zone, hl), humanoids);
  });

  // Smooth joint spheres at knees + elbows
  [[6, 0.065, 'pants'], [7, 0.065, 'pants'], [12, 0.038, 'jacket'], [13, 0.038, 'jacket']]
    .forEach(([idx, r, zone]) => sphereAt(joints[idx], r, makeGiMat(isBlue, zone, highlightSet.has(idx)), humanoids));

  // Head sphere
  sphereAt(joints[22], 0.108, makeGiMat(isBlue, 'jacket', highlightSet.has(22)), humanoids);

  // Gi collar + belt
  addGiDetails(joints, isBlue, humanoids);
}

// ─────────────────────────────────────────────────────────────────────────────
// Scene management
// ─────────────────────────────────────────────────────────────────────────────

function sceneCenter(pos) {
  let x=0,y=0,z=0,n=0;
  for (const p of pos.players) for (const [px,py,pz] of p) { x+=px; y+=py; z+=pz; n++; }
  return new THREE.Vector3(x/n, y/n, z/n);
}

function loadScene(id) {
  humanoids.clear();

  const pos = POSITIONS[id];
  const hl  = pos.highlight;
  const p0Blue = (id === 'closed_guard');

  buildPlayer(pos.players[0], p0Blue,  new Set(hl[0] || []));
  buildPlayer(pos.players[1], !p0Blue, new Set(hl[1] || []));

  const center = sceneCenter(pos);
  const lo = pos.lookOffset, co = pos.camOffset;
  controls.target.set(center.x + lo[0], center.y + lo[1], center.z + lo[2]);
  camera.position.set(center.x + co[0], center.y + co[1], center.z + co[2]);
  controls.update();

  document.getElementById('label-title').textContent = pos.label;
  document.querySelectorAll('.scene-btn').forEach(b => b.classList.toggle('active', b.dataset.scene === id));
}

// ─────────────────────────────────────────────────────────────────────────────
// UI + resize + render loop
// ─────────────────────────────────────────────────────────────────────────────

document.querySelectorAll('.scene-btn').forEach(btn => btn.addEventListener('click', () => loadScene(btn.dataset.scene)));

let hintGone = false;
renderer.domElement.addEventListener('mousedown', () => {
  if (!hintGone) { document.getElementById('hint').style.opacity = '0'; hintGone = true; }
});

window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

function animate() { requestAnimationFrame(animate); controls.update(); renderer.render(scene3d, camera); }

// ─────────────────────────────────────────────────────────────────────────────
// Boot
// ─────────────────────────────────────────────────────────────────────────────

initTextures();
loadScene('side_control');
animate();
</script>
</body>
</html>
