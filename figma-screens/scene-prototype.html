<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BJJ Mind — 3D Position Viewer</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@600;700;800&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0A0B14;
      overflow: hidden;
      font-family: 'Nunito', sans-serif;
    }

    canvas { display: block; }

    #scene-label {
      position: fixed;
      top: 28px;
      left: 50%;
      transform: translateX(-50%);
      text-align: center;
      pointer-events: none;
    }
    #scene-label .title {
      font-size: 22px;
      font-weight: 800;
      color: #F9FAFB;
      letter-spacing: -0.3px;
    }
    #scene-label .subtitle {
      font-size: 13px;
      font-weight: 600;
      color: #6B7280;
      margin-top: 2px;
    }

    #scene-nav {
      position: fixed;
      bottom: 36px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 10px;
      background: rgba(17, 19, 31, 0.85);
      backdrop-filter: blur(16px);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 20px;
      padding: 8px 12px;
    }

    .scene-btn {
      padding: 9px 18px;
      border-radius: 14px;
      border: none;
      font-family: 'Nunito', sans-serif;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s ease;
      background: transparent;
      color: #9CA3AF;
    }
    .scene-btn:hover { color: #E5E7EB; background: rgba(255,255,255,0.06); }
    .scene-btn.active { background: #7C3AED; color: #fff; }

    #hint {
      position: fixed;
      bottom: 100px;
      left: 50%;
      transform: translateX(-50%);
      color: #374151;
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.5px;
      pointer-events: none;
      transition: opacity 0.5s;
    }
  </style>
</head>
<body>

<div id="scene-label">
  <div class="title" id="label-title">Side Control</div>
  <div class="subtitle">Drag to rotate &bull; Scroll to zoom</div>
</div>

<div id="scene-nav">
  <button class="scene-btn active" data-scene="side_control">Side Control</button>
  <button class="scene-btn" data-scene="mount">Mount</button>
  <button class="scene-btn" data-scene="closed_guard">Closed Guard</button>
  <button class="scene-btn" data-scene="back_mount">Back Mount</button>
</div>

<div id="hint">DRAG TO ROTATE</div>

<script type="importmap">
{

    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
  }
}
</script>

      [[-0.587,0.414,-0.441],[-0.71,0.546,-0.31],[-0.416,0.295,-0.34],[-0.586,0.382,-0.211],[-0.458,0.371,-0.327],[-0.561,0.457,-0.257],[-0.374,0.417,0.09],[-0.134,0.412,-0.307],[-0.013,0.183,0.124],[0.094,0.129,-0.074],[0.46,0.156,0.44],[0.612,0.145,0.139],[0.214,0.045,0.542],[0.552,0.054,-0.132],[0.057,0.105,0.345],[0.299,0.062,-0.041],[0.052,0.187,0.343],[0.319,0.137,-0.063],[0.074,0.225,0.278],[0.268,0.196,-0.06],[0.246,0.102,0.146],[0.578,0.172,0.311],[0.684,0.287,0.358]]
    ],

  back_mount: {

      // Player 0 (white — attacker, taking the back)

      // Player 1 (blue — victim, back taken)
      [[-0.077,0.025,-0.875],[0.367,0.026,-0.963],[-0.028,0.03,-0.649],[0.363,0.03,-0.731],[-0.062,0.084,-0.708],[0.348,0.086,-0.797],[-0.134,0.372,-0.4],[0.431,0.437,-0.564],[0.153,0.09,-0.243],[0.375,0.09,-0.313],[0.214,0.447,0.191],[0.462,0.573,0.034],[-0.008,0.453,0.005],[0.676,0.423,-0.085],[0.239,0.499,-0.088],[0.459,0.518,-0.192],[0.266,0.573,-0.069],[0.421,0.587,-0.17],[0.345,0.585,-0.064],[0.376,0.586,-0.106],[0.319,0.264,-0.114],[0.313,0.57,0.123],[0.248,0.72,0.105]]
    ],
    highlight: { 0: [6, 7, 4, 5] },  // white player's hooks (knee/ankle control)
    camOffset: [1.5, 0.9, 0.5],
    lookOffset: [0, 0.15, 0]
  }
};

// ─────────────────────────────────────────────────────────────────────────────
// Limb definitions: [jointA_idx, jointB_idx, radius_m]
// Based on GrappleMap players.hpp limbs() specification
// ─────────────────────────────────────────────────────────────────────────────

const LIMBS = [
  [0, 2, 0.028],   // LeftToe -> LeftHeel
  [1, 3, 0.028],   // RightToe -> RightHeel
  [2, 4, 0.030],   // LeftHeel -> LeftAnkle
  [3, 5, 0.030],   // RightHeel -> RightAnkle
  [4, 6, 0.055],   // LeftAnkle -> LeftKnee  (lower leg)
  [5, 7, 0.055],   // RightAnkle -> RightKnee
  [6, 8, 0.085],   // LeftKnee -> LeftHip    (upper leg)
  [7, 9, 0.085],   // RightKnee -> RightHip
  [8, 9, 0.095],   // LeftHip <-> RightHip   (pelvis)
  [8, 20, 0.100],  // LeftHip -> Core
  [9, 20, 0.100],  // RightHip -> Core
  [20, 21, 0.090], // Core -> Neck           (spine)
  [10, 11, 0.090], // LeftShoulder <-> RightShoulder (chest)
  [20, 10, 0.090], // Core -> LeftShoulder
  [20, 11, 0.090], // Core -> RightShoulder
  [10, 12, 0.042], // LeftShoulder -> LeftElbow  (upper arm)
  [11, 13, 0.042], // RightShoulder -> RightElbow
  [12, 14, 0.032], // LeftElbow -> LeftWrist    (forearm)
  [13, 15, 0.032], // RightElbow -> RightWrist
  [14, 16, 0.024], // LeftWrist -> LeftHand
  [15, 17, 0.024], // RightWrist -> RightHand
  [21, 22, 0.052], // Neck -> Head
];

// ─────────────────────────────────────────────────────────────────────────────
// Renderer setup
// ─────────────────────────────────────────────────────────────────────────────

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.2;
renderer.outputColorSpace = THREE.SRGBColorSpace;
document.body.appendChild(renderer.domElement);

const scene3d = new THREE.Scene();
scene3d.background = new THREE.Color(0x08090F);
scene3d.fog = new THREE.FogExp2(0x08090F, 0.25);

const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.01, 20);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.08;
controls.minDistance = 0.5;
controls.maxDistance = 5.0;
controls.maxPolarAngle = Math.PI * 0.80;

// ─────────────────────────────────────────────────────────────────────────────
// Lighting
// ─────────────────────────────────────────────────────────────────────────────

scene3d.add(new THREE.AmbientLight(0x7080C0, 0.4));

const keyLight = new THREE.DirectionalLight(0xFFF5E0, 1.6);
keyLight.position.set(2.5, 5, 3);
keyLight.castShadow = true;
keyLight.shadow.mapSize.setScalar(2048);
keyLight.shadow.camera.near = 0.1;
keyLight.shadow.camera.far = 15;
keyLight.shadow.camera.left = -3;
keyLight.shadow.camera.right = 3;
keyLight.shadow.camera.top = 3;
keyLight.shadow.camera.bottom = -3;
keyLight.shadow.bias = -0.0004;
keyLight.shadow.radius = 5;
scene3d.add(keyLight);

const fillLight = new THREE.DirectionalLight(0x3050A0, 0.45);
fillLight.position.set(-3, 1.5, -1);
scene3d.add(fillLight);

const rimLight = new THREE.DirectionalLight(0xA0C0FF, 0.35);
rimLight.position.set(0, 2, -5);
scene3d.add(rimLight);

// ─────────────────────────────────────────────────────────────────────────────
// Mat / Ground
// ─────────────────────────────────────────────────────────────────────────────

const matGeo = new THREE.PlaneGeometry(6, 6, 12, 12);
const matMesh = new THREE.Mesh(matGeo, new THREE.MeshStandardMaterial({
  color: 0x1A2010,
  roughness: 0.95,
  metalness: 0.0,
}));
matMesh.rotation.x = -Math.PI / 2;
matMesh.receiveShadow = true;
scene3d.add(matMesh);

// Mat border (slightly darker)
const borderMesh = new THREE.Mesh(
  new THREE.PlaneGeometry(6.1, 6.1),
  new THREE.MeshStandardMaterial({ color: 0x111808, roughness: 1 })
);
borderMesh.rotation.x = -Math.PI / 2;
borderMesh.position.y = -0.001;
scene3d.add(borderMesh);

// ─────────────────────────────────────────────────────────────────────────────
// Materials
// ─────────────────────────────────────────────────────────────────────────────

const BLUE  = new THREE.Color(0x1D4ED8);
const WHITE = new THREE.Color(0xCDD5E0);
const AMBER = new THREE.Color(0xF59E0B);
const AMBER_EMIT = new THREE.Color(0xC07000);

function makeMat(baseColor, highlight = false) {
  return new THREE.MeshStandardMaterial({
    color: highlight ? AMBER : baseColor,
    roughness: highlight ? 0.25 : 0.75,
    metalness: 0.02,
    emissive: highlight ? AMBER_EMIT : new THREE.Color(0, 0, 0),
    emissiveIntensity: highlight ? 0.6 : 0,
  });
}

// ─────────────────────────────────────────────────────────────────────────────
// Geometry helpers
// ─────────────────────────────────────────────────────────────────────────────

const _up = new THREE.Vector3(0, 1, 0);
const _d  = new THREE.Vector3();
const _q  = new THREE.Quaternion();

function capsuleBetween(pA, pB, radius, mat, group) {
  _d.set(pB[0] - pA[0], pB[1] - pA[1], pB[2] - pA[2]);
  const len = _d.length();
  if (len < 0.004) return;

  const cylLen = Math.max(0.002, len - radius * 1.4);
  const geo = new THREE.CapsuleGeometry(radius, cylLen, 4, 12);
  const mesh = new THREE.Mesh(geo, mat);

  mesh.position.set((pA[0]+pB[0])/2, (pA[1]+pB[1])/2, (pA[2]+pB[2])/2);

  _d.normalize();
  const dot = _d.dot(_up);
  if (Math.abs(dot) > 0.9999) {
    if (dot < 0) mesh.quaternion.setFromAxisAngle(new THREE.Vector3(1,0,0), Math.PI);
    // else identity
  } else {
    _q.setFromUnitVectors(_up, _d);
    mesh.quaternion.copy(_q);
  }

  mesh.castShadow = true;
  group.add(mesh);
}

function sphereAt(pos, radius, mat, group) {
  const mesh = new THREE.Mesh(new THREE.SphereGeometry(radius, 16, 12), mat);
  mesh.position.set(pos[0], pos[1], pos[2]);
  mesh.castShadow = true;
  group.add(mesh);
}

// ─────────────────────────────────────────────────────────────────────────────
// Humanoid builder
// ─────────────────────────────────────────────────────────────────────────────

const humanoids = new THREE.Group();
scene3d.add(humanoids);

function buildPlayer(joints, isBlue, highlightSet) {
  const base = isBlue ? BLUE : WHITE;

  for (const [jA, jB, radius] of LIMBS) {
    const hl = highlightSet.has(jA) || highlightSet.has(jB);
    capsuleBetween(joints[jA], joints[jB], radius, makeMat(base, hl), humanoids);
  }

  // Smooth joint spheres at knees + elbows
  const jointBalls = [[6, 0.065], [7, 0.065], [12, 0.038], [13, 0.038]];
  for (const [idx, r] of jointBalls) {
    sphereAt(joints[idx], r, makeMat(base, highlightSet.has(idx)), humanoids);
  }

  // Head sphere
  sphereAt(joints[22], 0.108, makeMat(base, highlightSet.has(22)), humanoids);
}

// ─────────────────────────────────────────────────────────────────────────────
// Scene switching
// ─────────────────────────────────────────────────────────────────────────────

function sceneCenter(posData) {
  let x=0,y=0,z=0,n=0;
  for (const player of posData.players) {
    for (const [px,py,pz] of player) { x+=px; y+=py; z+=pz; n++; }
  }
  return new THREE.Vector3(x/n, y/n, z/n);
}

function loadScene(id) {
  // Clear
  humanoids.clear();

  const pos = POSITIONS[id];
  const hl = pos.highlight;

  // Player 0 = white in side_control/mount/back_mount, blue in guard
  const p0Blue = (id === 'closed_guard');
  buildPlayer(pos.players[0], p0Blue,     new Set(hl[0] || []));
  buildPlayer(pos.players[1], !p0Blue,    new Set(hl[1] || []));

  // Camera
  const center = sceneCenter(pos);
  const lo = pos.lookOffset;
  controls.target.set(center.x + lo[0], center.y + lo[1], center.z + lo[2]);

  const co = pos.camOffset;
  camera.position.set(center.x + co[0], center.y + co[1], center.z + co[2]);
  controls.update();

  document.getElementById('label-title').textContent = pos.label;
  document.querySelectorAll('.scene-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.scene === id);
  });
}

// ─────────────────────────────────────────────────────────────────────────────
// UI events
// ─────────────────────────────────────────────────────────────────────────────

document.querySelectorAll('.scene-btn').forEach(btn => {
  btn.addEventListener('click', () => loadScene(btn.dataset.scene));
});

let hintGone = false;
renderer.domElement.addEventListener('mousedown', () => {
  if (!hintGone) { document.getElementById('hint').style.opacity = '0'; hintGone = true; }
});

// ─────────────────────────────────────────────────────────────────────────────
// Resize + render loop
// ─────────────────────────────────────────────────────────────────────────────

window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

function animate() {
  requestAnimationFrame(animate);
  controls.update();
  renderer.render(scene3d, camera);
}

loadScene('side_control');
animate();
</script>
</body>
</html>
