<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=390, initial-scale=1.0" />
  <title>BJJ Mind — Micro Round</title>
  <script src="https://mcp.figma.com/mcp/html-to-design/capture.js" async></script>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 390px;
      height: 844px;
      background: #ffffff;
      font-family: 'Nunito', sans-serif;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    /* Top bar */
    .topbar {
      display: flex;
      align-items: center;
      padding: 52px 24px 0;
      gap: 12px;
      flex-shrink: 0;
    }

    .progress-bar-wrap {
      flex: 1;
      height: 10px;
      background: #f3f0ff;
      border-radius: 100px;
      overflow: hidden;
    }

    .progress-bar-fill {
      width: 30%;
      height: 100%;
      background: #7c3aed;
      border-radius: 100px;
    }

    .hearts {
      display: flex;
      gap: 3px;
    }

    .heart { font-size: 16px; }

    /* Position + timer row */
    .meta-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 24px 12px;
      flex-shrink: 0;
    }

    .position-tag {
      background: #f5f0ff;
      border-radius: 100px;
      padding: 6px 14px;
      font-size: 13px;
      font-weight: 800;
      color: #7c3aed;
    }

    .timer {
      width: 42px;
      height: 42px;
      border-radius: 50%;
      background: #fff7ed;
      border: 3px solid #f59e0b;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      font-weight: 900;
      color: #f59e0b;
    }

    /* Scene */
    .scene {
      margin: 0 24px;
      background: #f8f6ff;
      border-radius: 20px;
      height: 200px;
      position: relative;
      overflow: hidden;
      border: 1.5px solid #ede9fe;
      flex-shrink: 0;
    }

    .scene-label {
      position: absolute;
      top: 12px;
      left: 16px;
      font-size: 10px;
      font-weight: 800;
      color: #c4b5fd;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .legend {
      position: absolute;
      bottom: 12px;
      right: 14px;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 11px;
      font-weight: 700;
      color: #9ca3af;
    }

    .legend-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
    }

    /* Question */
    .question-area {
      padding: 18px 24px 14px;
      flex-shrink: 0;
    }

    .question-text {
      font-size: 19px;
      font-weight: 900;
      color: #1a1a2e;
      line-height: 1.3;
      letter-spacing: -0.3px;
    }

    .question-sub {
      font-size: 13px;
      font-weight: 600;
      color: #9ca3af;
      margin-top: 4px;
    }

    /* Options */
    .options {
      padding: 0 24px 0;
      display: flex;
      flex-direction: column;
      gap: 10px;
      flex-shrink: 0;
    }

    .option-btn {
      width: 100%;
      min-height: 58px;
      border-radius: 16px;
      border: 2.5px solid #f3f4f6;
      background: #ffffff;
      display: flex;
      align-items: center;
      padding: 10px 16px;
      gap: 12px;
      cursor: pointer;
    }

    .option-letter {
      width: 34px;
      height: 34px;
      border-radius: 10px;
      background: #f5f0ff;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      font-weight: 900;
      color: #7c3aed;
      flex-shrink: 0;
    }

    .option-text {
      font-size: 15px;
      font-weight: 700;
      color: #1a1a2e;
      line-height: 1.3;
    }
  </style>
</head>
<body>

  <div class="topbar">
    <div class="progress-bar-wrap">
      <div class="progress-bar-fill"></div>
    </div>
    <div class="hearts">
      <span class="heart">❤️</span>
      <span class="heart">❤️</span>
      <span class="heart">❤️</span>
    </div>
  </div>

  <div class="meta-row">
    <div class="position-tag">Bottom Side Control</div>
    <div class="timer">5</div>
  </div>

  <div class="scene">
    <div class="scene-label">Top view</div>
    <svg width="100%" height="100%" viewBox="0 0 342 200" fill="none" xmlns="http://www.w3.org/2000/svg">
      <rect width="342" height="200" fill="#f8f6ff"/>
      <!-- Grid -->
      <line x1="0" y1="50" x2="342" y2="50" stroke="#ede9fe" stroke-width="1"/>
      <line x1="0" y1="100" x2="342" y2="100" stroke="#ede9fe" stroke-width="1"/>
      <line x1="0" y1="150" x2="342" y2="150" stroke="#ede9fe" stroke-width="1"/>
      <line x1="85" y1="0" x2="85" y2="200" stroke="#ede9fe" stroke-width="1"/>
      <line x1="171" y1="0" x2="171" y2="200" stroke="#ede9fe" stroke-width="1"/>
      <line x1="257" y1="0" x2="257" y2="200" stroke="#ede9fe" stroke-width="1"/>

      <!-- YOU (blue) — on bottom, horizontal -->
      <rect x="80" y="82" width="170" height="48" rx="24" fill="#3b82f6" opacity="0.85"/>
      <circle cx="262" cy="106" r="24" fill="#3b82f6" opacity="0.85"/>
      <text x="158" y="111" font-family="Nunito" font-size="11" font-weight="800" fill="white" text-anchor="middle">YOU</text>

      <!-- OPPONENT (red) — side control on top -->
      <rect x="130" y="44" width="44" height="110" rx="22" fill="#ef4444" opacity="0.85"/>
      <circle cx="152" cy="34" r="20" fill="#ef4444" opacity="0.85"/>
      <!-- Arm across chest -->
      <rect x="82" y="80" width="76" height="14" rx="7" fill="#dc2626" opacity="0.7" transform="rotate(10 120 87)"/>
      <text x="152" y="108" font-family="Nunito" font-size="10" font-weight="800" fill="white" text-anchor="middle">OPP</text>

      <!-- Danger highlight -->
      <circle cx="118" cy="90" r="12" fill="#ef4444" opacity="0.12"/>
    </svg>

    <div class="legend">
      <div class="legend-item">
        <div class="legend-dot" style="background:#3b82f6"></div>You
      </div>
      <div class="legend-item">
        <div class="legend-dot" style="background:#ef4444"></div>Opp
      </div>
    </div>
  </div>

  <div class="question-area">
    <div class="question-text">Opponent is going for Mount.<br/>What do you do with your arms?</div>
    <div class="question-sub">Tap before the timer runs out</div>
  </div>

  <div class="options">
    <div class="option-btn">
      <div class="option-letter">A</div>
      <div class="option-text">Push against their chest with both hands</div>
    </div>
    <div class="option-btn">
      <div class="option-letter">B</div>
      <div class="option-text">Frame on their hip to create distance</div>
    </div>
  </div>

</body>
</html>
