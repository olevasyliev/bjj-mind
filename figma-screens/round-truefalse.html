<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=390, initial-scale=1.0" />
  <title>BJJ Mind — True / False</title>
  <script src="https://mcp.figma.com/mcp/html-to-design/capture.js" async></script>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 390px;
      height: 844px;
      background: #ffffff;
      font-family: 'Nunito', sans-serif;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    .topbar {
      display: flex;
      align-items: center;
      padding: 52px 24px 0;
      gap: 14px;
      flex-shrink: 0;
    }

    .close-btn {
      width: 32px; height: 32px;
      border-radius: 50%; background: #f9f8ff;
      border: 1.5px solid #ede9fe;
      display: flex; align-items: center; justify-content: center;
      font-size: 14px; color: #9ca3af;
    }

    .progress-bar-wrap {
      flex: 1; height: 10px;
      background: #f3f0ff; border-radius: 100px; overflow: hidden;
    }

    .progress-bar-fill {
      width: 60%; height: 100%;
      background: #7c3aed; border-radius: 100px;
    }

    .hearts { display: flex; gap: 2px; flex-shrink: 0; }
    .heart { font-size: 17px; }
    .heart.lost { opacity: 0.25; }

    /* Format badge */
    .format-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 24px 0;
    }

    .format-badge {
      background: #fef3c7;
      border: 1.5px solid #fde68a;
      border-radius: 100px;
      padding: 5px 14px;
      font-size: 12px;
      font-weight: 800;
      color: #92400e;
    }

    /* Timer ring */
    .timer-ring { position: relative; width: 52px; height: 52px; flex-shrink: 0; }
    .timer-ring svg { transform: rotate(-90deg); }
    .timer-number {
      position: absolute; inset: 0;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px; font-weight: 900; color: #f59e0b;
    }

    /* Statement card — big and centered */
    .statement-wrap {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 0 28px;
      text-align: center;
    }

    .statement-label {
      font-size: 12px;
      font-weight: 800;
      color: #a78bfa;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 20px;
    }

    /* Statement card */
    .statement-card {
      background: #f9f8ff;
      border: 2px solid #ede9fe;
      border-radius: 28px;
      padding: 28px 24px;
      width: 100%;
      margin-bottom: 32px;
    }

    .statement-icon {
      font-size: 44px;
      margin-bottom: 16px;
    }

    .statement-text {
      font-size: 22px;
      font-weight: 900;
      color: #1a1a2e;
      line-height: 1.3;
      letter-spacing: -0.4px;
    }

    .statement-context {
      font-size: 14px;
      font-weight: 600;
      color: #9ca3af;
      margin-top: 8px;
      line-height: 1.4;
    }

    /* TRUE / FALSE buttons */
    .tf-buttons {
      display: flex;
      gap: 12px;
      width: 100%;
    }

    .btn-true {
      flex: 1;
      height: 72px;
      border-radius: 22px;
      background: #f0fdf4;
      border: 3px solid #86efac;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 4px;
      cursor: pointer;
    }

    .btn-false {
      flex: 1;
      height: 72px;
      border-radius: 22px;
      background: #fef2f2;
      border: 3px solid #fca5a5;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 4px;
      cursor: pointer;
    }

    .btn-tf-icon { font-size: 26px; line-height: 1; }

    .btn-tf-label {
      font-size: 14px;
      font-weight: 900;
      letter-spacing: 0.5px;
    }

    .btn-true .btn-tf-label { color: #16a34a; }
    .btn-false .btn-tf-label { color: #dc2626; }

    .swipe-hint {
      font-size: 12px;
      font-weight: 700;
      color: #d1d5db;
      text-align: center;
      margin-top: 14px;
    }

    /* Bottom padding */
    .bottom-pad { height: 32px; flex-shrink: 0; }
  </style>
</head>
<body>

  <div class="topbar">
    <div class="close-btn">✕</div>
    <div class="progress-bar-wrap"><div class="progress-bar-fill"></div></div>
    <div class="hearts">
      <span class="heart">❤️</span><span class="heart">❤️</span>
      <span class="heart">❤️</span><span class="heart lost">❤️</span>
      <span class="heart lost">❤️</span>
    </div>
  </div>

  <div class="format-row">
    <div class="format-badge">⚡ True or False</div>
    <div class="timer-ring">
      <svg width="52" height="52" viewBox="0 0 52 52">
        <circle cx="26" cy="26" r="21" fill="none" stroke="#fef3c7" stroke-width="5"/>
        <circle cx="26" cy="26" r="21" fill="none" stroke="#f59e0b" stroke-width="5"
          stroke-linecap="round" stroke-dasharray="131.9" stroke-dashoffset="82"/>
      </svg>
      <div class="timer-number">4</div>
    </div>
  </div>

  <div class="statement-wrap">
    <div class="statement-label">Is this statement correct?</div>

    <div class="statement-card">
      <div class="statement-icon">🛡️</div>
      <div class="statement-text">"You should always try to sit up immediately when in side control bottom."</div>
      <div class="statement-context">Situation: opponent has settled side control, their weight is on your chest</div>
    </div>

    <div class="tf-buttons">
      <div class="btn-true" onclick="location.href='feedback-wrong.html'" style="cursor:pointer">
        <div class="btn-tf-icon">✓</div>
        <div class="btn-tf-label">TRUE</div>
      </div>
      <div class="btn-false" onclick="location.href='feedback-correct.html'" style="cursor:pointer">
        <div class="btn-tf-icon">✕</div>
        <div class="btn-tf-label">FALSE</div>
      </div>
    </div>

    <div class="swipe-hint">swipe right for TRUE · swipe left for FALSE</div>
  </div>

  <div class="bottom-pad"></div>

</body>
</html>
