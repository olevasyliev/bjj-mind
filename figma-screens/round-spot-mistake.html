<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=390, initial-scale=1.0" />
  <title>BJJ Mind — Spot the Mistake</title>
  <script src="https://mcp.figma.com/mcp/html-to-design/capture.js" async></script>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 390px;
      height: 844px;
      background: #ffffff;
      font-family: 'Nunito', sans-serif;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    .topbar {
      display: flex; align-items: center;
      padding: 52px 24px 0; gap: 14px; flex-shrink: 0;
    }

    .close-btn {
      width: 32px; height: 32px; border-radius: 50%;
      background: #f9f8ff; border: 1.5px solid #ede9fe;
      display: flex; align-items: center; justify-content: center;
      font-size: 14px; color: #9ca3af;
    }

    .progress-bar-wrap {
      flex: 1; height: 10px;
      background: #f3f0ff; border-radius: 100px; overflow: hidden;
    }

    .progress-bar-fill {
      width: 55%; height: 100%;
      background: #7c3aed; border-radius: 100px;
    }

    .hearts { display: flex; gap: 2px; flex-shrink: 0; }
    .heart { font-size: 17px; }
    .heart.lost { opacity: 0.25; }

    .meta-row {
      display: flex; align-items: center; justify-content: space-between;
      padding: 16px 24px 0;
    }

    .format-badge {
      background: #fef2f2; border: 1.5px solid #fecaca;
      border-radius: 100px; padding: 5px 14px;
      font-size: 12px; font-weight: 800; color: #991b1b;
    }

    .timer-ring { position: relative; width: 52px; height: 52px; }
    .timer-ring svg { transform: rotate(-90deg); }
    .timer-number {
      position: absolute; inset: 0;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px; font-weight: 900; color: #f59e0b;
    }

    .question-area {
      padding: 18px 24px 14px; flex-shrink: 0;
    }

    .question-text {
      font-size: 19px; font-weight: 900; color: #1a1a2e;
      line-height: 1.3; letter-spacing: -0.3px;
    }

    .question-sub {
      font-size: 13px; font-weight: 600; color: #9ca3af; margin-top: 4px;
    }

    /* Scene with mistake highlighted */
    .scene {
      margin: 0 20px;
      background: #f8f6ff; border-radius: 22px;
      height: 210px; border: 1.5px solid #ede9fe;
      overflow: hidden; flex-shrink: 0;
    }

    /* Answer options — describe the mistake */
    .options {
      padding: 16px 20px 0;
      display: flex;
      flex-direction: column;
      gap: 10px;
      flex: 1;
    }

    .option-btn {
      width: 100%;
      min-height: 60px;
      border-radius: 18px;
      border: 2.5px solid #ede9fe;
      background: #ffffff;
      display: flex;
      align-items: center;
      padding: 12px 16px;
      gap: 14px;
      cursor: pointer;
    }

    .option-letter {
      width: 34px; height: 34px;
      border-radius: 12px; background: #f5f0ff;
      display: flex; align-items: center; justify-content: center;
      font-size: 14px; font-weight: 900; color: #7c3aed; flex-shrink: 0;
    }

    .option-text {
      font-size: 14px; font-weight: 700; color: #1a1a2e; line-height: 1.3;
    }
  </style>
</head>
<body>

  <div class="topbar">
    <div class="close-btn">✕</div>
    <div class="progress-bar-wrap"><div class="progress-bar-fill"></div></div>
    <div class="hearts">
      <span class="heart">❤️</span><span class="heart">❤️</span>
      <span class="heart">❤️</span><span class="heart lost">❤️</span>
      <span class="heart lost">❤️</span>
    </div>
  </div>

  <div class="meta-row">
    <div class="format-badge">🔍 Spot the mistake</div>
    <div class="timer-ring">
      <svg width="52" height="52" viewBox="0 0 52 52">
        <circle cx="26" cy="26" r="21" fill="none" stroke="#fef3c7" stroke-width="5"/>
        <circle cx="26" cy="26" r="21" fill="none" stroke="#f59e0b" stroke-width="5"
          stroke-linecap="round" stroke-dasharray="131.9" stroke-dashoffset="49.5"/>
      </svg>
      <div class="timer-number">5</div>
    </div>
  </div>

  <div class="question-area">
    <div class="question-text">Blue is trying to escape. What are they doing wrong?</div>
    <div class="question-sub">Look at the highlighted area</div>
  </div>

  <!-- Scene: blue player pushing chest (mistake) — highlighted in red -->
  <div class="scene">
    <svg width="100%" height="100%" viewBox="0 0 350 210" fill="none">
      <rect width="350" height="210" fill="#f8f6ff"/>
      <line x1="0" y1="70" x2="350" y2="70" stroke="#ede9fe" stroke-width="1"/>
      <line x1="0" y1="140" x2="350" y2="140" stroke="#ede9fe" stroke-width="1"/>
      <line x1="116" y1="0" x2="116" y2="210" stroke="#ede9fe" stroke-width="1"/>
      <line x1="232" y1="0" x2="232" y2="210" stroke="#ede9fe" stroke-width="1"/>

      <!-- YOU (blue) -->
      <rect x="65" y="92" width="196" height="44" rx="22" fill="#3b82f6"/>
      <circle cx="273" cy="114" r="24" fill="#3b82f6"/>
      <text x="160" y="119" font-family="Nunito" font-size="13" font-weight="900" fill="white" text-anchor="middle">YOU</text>

      <!-- OPP (red) side control -->
      <rect x="136" y="40" width="44" height="128" rx="22" fill="#ef4444"/>
      <circle cx="158" cy="28" r="22" fill="#ef4444"/>
      <text x="158" y="114" font-family="Nunito" font-size="11" font-weight="900" fill="white" text-anchor="middle">OPP</text>

      <!-- MISTAKE: Blue arms pushing chest (both arms up toward chest — wrong!) -->
      <!-- Left arm pushing up to chest -->
      <rect x="108" y="82" width="52" height="14" rx="7" fill="#2563eb" transform="rotate(-35 134 89)"/>
      <!-- Right arm pushing up to chest -->
      <rect x="158" y="78" width="52" height="14" rx="7" fill="#2563eb" transform="rotate(-30 184 85)"/>

      <!-- RED MISTAKE HIGHLIGHT — pulsing circle on the arm positions -->
      <ellipse cx="152" cy="72" rx="48" ry="22" fill="#ef4444" opacity="0.12"/>
      <ellipse cx="152" cy="72" rx="48" ry="22" fill="none" stroke="#ef4444" stroke-width="2.5" stroke-dasharray="6 3"/>

      <!-- Mistake label -->
      <text x="152" y="52" font-family="Nunito" font-size="10" font-weight="900" fill="#dc2626" text-anchor="middle">⚠ mistake here</text>

      <text x="14" y="22" font-family="Nunito" font-size="9" font-weight="800" fill="#c4b5fd">TOP VIEW</text>
    </svg>
  </div>

  <div class="options">
    <div class="option-btn">
      <div class="option-letter">A</div>
      <div class="option-text">Pushing the chest lifts their elbows — easy armbar</div>
    </div>
    <div class="option-btn">
      <div class="option-letter">B</div>
      <div class="option-text">Their hips are not shrimped away first</div>
    </div>
    <div class="option-btn">
      <div class="option-letter">C</div>
      <div class="option-text">No frame on the hip before moving</div>
    </div>
  </div>

</body>
</html>
