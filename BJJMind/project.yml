name: BJJMind
options:
  bundleIdPrefix: com.aleksei
  deploymentTarget:
    iOS: "16.0"
  xcodeVersion: "16"
  createIntermediateGroups: true

settings:
  base:
    PRODUCT_BUNDLE_IDENTIFIER: com.aleksei.BJJMind
    MARKETING_VERSION: 1.1.1
    CURRENT_PROJECT_VERSION: 4
    SWIFT_VERSION: 6.0
    IPHONEOS_DEPLOYMENT_TARGET: 16.0
    TARGETED_DEVICE_FAMILY: 1
    DEVELOPMENT_TEAM: ""
    DEVELOPMENT_LANGUAGE: en

targets:
  BJJMind:
    type: application
    platform: iOS
    sources:
      - path: Sources/BJJMind
    settings:
      base:
        INFOPLIST_FILE: Sources/BJJMind/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    resources:
      - Sources/BJJMind/Assets.xcassets
      - Sources/BJJMind/Resources/Fonts

  BJJMindTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: Tests/BJJMindTests
    dependencies:
      - target: BJJMind
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.aleksei.BJJMindTests
        GENERATE_INFOPLIST_FILE: YES
